<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-OS — Login</title>
<style>
:root{
  --bg:#04060f;--panel:#0b0f1e;--border:#1a2040;
  --blue:#4f8eff;--green:#22c55e;--red:#f87171;--gray:#64748b;
  --ink:#e2e8f8;--ink2:#8892b0;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--font);
  min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:36px 40px;width:100%;max-width:360px;
}
.logo{font-size:20px;font-weight:700;color:var(--blue);letter-spacing:2px;margin-bottom:6px}
.sub{font-size:13px;color:var(--ink2);margin-bottom:28px}
label{display:block;font-size:12px;color:var(--ink2);margin-bottom:4px;margin-top:16px}
input{
  width:100%;padding:10px 12px;border-radius:6px;
  border:1px solid var(--border);background:#0d1228;
  color:var(--ink);font-size:14px;outline:none;
}
input:focus{border-color:var(--blue)}
.btn{
  width:100%;margin-top:24px;padding:11px;border-radius:6px;
  background:var(--blue);color:#fff;font-size:14px;font-weight:600;
  border:none;cursor:pointer;letter-spacing:.5px;
}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:default}
.err{
  margin-top:14px;padding:10px 12px;border-radius:6px;
  background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);
  color:var(--red);font-size:13px;display:none;
}
</style>
</head>
<body>
<div class="box">
  <div class="logo">AI-OS</div>
  <div class="sub">JDL · Sistema de Gestão</div>
  <form id="form" onsubmit="doLogin(event)">
    <label>Utilizador</label>
    <input id="user" type="text" autocomplete="username" required autofocus>
    <label>Password</label>
    <input id="pass" type="password" autocomplete="current-password" required>
    <button class="btn" id="btn" type="submit">Entrar</button>
    <div class="err" id="err"></div>
  </form>
</div>
<script>
// Redirect to ?next= param or /factory after login
const nextUrl = new URLSearchParams(window.location.search).get('next') || '/factory';

// If already logged in, redirect
const existing = localStorage.getItem('aios_jwt');
if (existing) window.location = nextUrl;

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.disabled = true;
  btn.textContent = 'A entrar...';
  err.style.display = 'none';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('user').value.trim(),
        password: document.getElementById('pass').value,
      }),
    });
    const d = await r.json();
    if (d.ok && d.token) {
      localStorage.setItem('aios_jwt', d.token);
      localStorage.setItem('aios_user', JSON.stringify({ username: d.username, role: d.role, client_id: d.client_id }));
      const clientRoles = ['client_accounting','client_manager'];
      const dest = clientRoles.includes(d.role) ? '/conta' : nextUrl;
      window.location = dest;
    } else {
      err.textContent = d.error || 'Credenciais inválidas.';
      err.style.display = 'block';
    }
  } catch(ex) {
    err.textContent = 'Erro de rede. Tente novamente.';
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Entrar';
}
</script>
</body>
</html>
