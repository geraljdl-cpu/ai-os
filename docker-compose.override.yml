services:
  agent-router:
    env_file:
      - .env
    ports:
      - "5679:5679"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agent-router/patch:/app
      - ./runtime:/app/runtime
      - /home/jdl/ai-os:/host/ai-os
    user: "1000:1000"
    environment:
      - GIT_SAFE_DIR=/host/ai-os
    command: sh -c "git config --global --add safe.directory /host/ai-os && uvicorn app:app --host 0.0.0.0 --port 5679"
